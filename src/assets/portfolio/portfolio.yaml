      - title: Tessera
        desc: an analysis interface for single-cell sequencing data
        link: https://sanghoon.io/tessera
      - title: Cigareditte
        desc: >-
          scrolling social media feeds is like smoking an infinite cigarette.
          what if the cigarettes weren't infinite anymore?
        link: https://sanghoon.io/cigareditte